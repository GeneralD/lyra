name: Auto Tag, Release & Update Homebrew

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract version
        run: |
          VERSION=$(tr -d '[:space:]' < Sources/CLI/Resources/version.txt)
          if ! printf '%s\n' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Invalid version in version.txt: '$VERSION'" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Create tag if new
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        if: steps.release.outputs.exists == 'false'
        run: swift build --disable-sandbox -c release

      - name: Package binary
        if: steps.release.outputs.exists == 'false'
        run: |
          BUILD_DIR=$(swift build --disable-sandbox --show-bin-path -c release)
          STAGING="lyra-${VERSION}-macos-arm64"
          mkdir -p "$STAGING"
          cp "$BUILD_DIR/lyra" "$STAGING/"
          find "$BUILD_DIR" -name '*.bundle' -exec cp -R {} "$STAGING/" \;
          tar czf "${STAGING}.tar.gz" "$STAGING"
          echo "ARCHIVE=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" "$ARCHIVE" \
            --title "lyra $VERSION" \
            --generate-notes

      - name: Upload asset to existing release
        if: steps.release.outputs.exists == 'true' && steps.tag.outputs.created == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Rebuild and upload if release exists but has no binary asset
          if ! gh release view "$TAG" --json assets --jq '.assets[].name' | grep -q 'macos-arm64'; then
            swift build --disable-sandbox -c release
            BUILD_DIR=$(swift build --disable-sandbox --show-bin-path -c release)
            STAGING="lyra-${VERSION}-macos-arm64"
            mkdir -p "$STAGING"
            cp "$BUILD_DIR/lyra" "$STAGING/"
            find "$BUILD_DIR" -name '*.bundle' -exec cp -R {} "$STAGING/" \;
            tar czf "${STAGING}.tar.gz" "$STAGING"
            gh release upload "$TAG" "${STAGING}.tar.gz" --clobber
          fi

      - name: Update Homebrew formula
        if: steps.tag.outputs.created == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_PAT }}
          script: |
            const owner = 'GeneralD';
            const repo = 'homebrew-tap';
            const path = 'Formula/lyra.rb';
            const tag = process.env.TAG;
            const version = process.env.VERSION;

            // Download pre-built binary asset and compute sha256
            const crypto = require('crypto');
            const assetName = `lyra-${version}-macos-arm64.tar.gz`;
            const url = `https://github.com/GeneralD/lyra/releases/download/${tag}/${assetName}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Failed to download ${url}: ${response.status}`);
            const buffer = Buffer.from(await response.arrayBuffer());
            const sha256 = crypto.createHash('sha256').update(buffer).digest('hex');
            console.log(`SHA256: ${sha256}`);

            // Update formula
            const { data: file } = await github.rest.repos.getContent({ owner, repo, path });
            const content = Buffer.from(file.content, 'base64').toString('utf8');
            const updated = content
              .replace(/url ".*"/, `url "${url}"`)
              .replace(/version ".*"/, `version "${version}"`)
              .replace(/sha256 ".*"/, `sha256 "${sha256}"`);

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Update lyra to ${version}`,
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
            });
            console.log(`Updated formula to ${version}`);
