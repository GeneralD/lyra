name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        run: |
          VERSION=$(tr -d '[:space:]' < Sources/BackdropCLI/Resources/version.txt)
          if ! printf '%s\n' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Invalid version in version.txt: '$VERSION'" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Detected version: $VERSION"

      - name: Create or update tag
        run: |
          TAG="v${VERSION}"
          CURRENT_SHA=$(git rev-parse HEAD)
          EXISTING_SHA=$(git rev-parse "refs/tags/${TAG}" 2>/dev/null || echo "")

          if [ "$EXISTING_SHA" = "$CURRENT_SHA" ]; then
            echo "Tag ${TAG} already points to ${CURRENT_SHA}, skipping"
          elif [ -n "$EXISTING_SHA" ]; then
            echo "Moving tag ${TAG} from ${EXISTING_SHA} to ${CURRENT_SHA}"
            git tag -f "$TAG"
            git push origin "$TAG" --force
          else
            echo "Creating tag ${TAG} at ${CURRENT_SHA}"
            git tag "$TAG"
            git push origin "$TAG"
          fi
