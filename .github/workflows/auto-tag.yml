name: Auto Tag & Update Homebrew

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract version
        run: |
          VERSION=$(tr -d '[:space:]' < Sources/CLI/Resources/version.txt)
          if ! printf '%s\n' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Invalid version in version.txt: '$VERSION'" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Create tag if new
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check remote via API (not local git) to avoid stale refs
          if gh api "repos/${{ github.repository }}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Homebrew formula
        if: steps.tag.outputs.created == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_PAT }}
          script: |
            const owner = 'GeneralD';
            const repo = 'homebrew-tap';
            const path = 'Formula/lyra.rb';
            const tag = process.env.TAG;
            const version = process.env.VERSION;

            // Download tarball and compute sha256
            const crypto = require('crypto');
            const url = `https://github.com/GeneralD/lyra/archive/refs/tags/${tag}.tar.gz`;
            const response = await fetch(url);
            const buffer = Buffer.from(await response.arrayBuffer());
            const sha256 = crypto.createHash('sha256').update(buffer).digest('hex');
            console.log(`SHA256: ${sha256}`);

            // Update formula
            const { data: file } = await github.rest.repos.getContent({ owner, repo, path });
            const content = Buffer.from(file.content, 'base64').toString('utf8');
            const updated = content
              .replace(/url ".*"/, `url "https://github.com/GeneralD/lyra/archive/refs/tags/${tag}.tar.gz"`)
              .replace(/sha256 ".*"/, `sha256 "${sha256}"`);

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Update lyra to ${version}`,
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
            });
            console.log(`Updated formula to ${version}`);
