name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint (swift-format)
        run: swift format lint --strict --recursive Sources/ Tests/

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and check for warnings
        run: |
          swift build 2>&1 | tee /tmp/build.log
          WARNINGS=$(grep "warning:" /tmp/build.log | grep -v ".build/" || true)
          if [ -n "$WARNINGS" ]; then
            echo "::error::Build produced warnings in project sources"
            exit 1
          fi

      - name: Run tests with coverage
        run: swift test --enable-code-coverage

      - name: Generate lcov report
        if: always()
        run: |
          BIN=$(swift build --show-bin-path)
          TEST_BIN="$BIN/lyraPackageTests.xctest/Contents/MacOS/lyraPackageTests"
          COVERAGE_FILE="$GITHUB_WORKSPACE/coverage.lcov"
          PROFDATA=$(find .build -name 'default.profdata' -print -quit)
          if [[ -z "$PROFDATA" || ! -f "$PROFDATA" ]]; then
            echo "Coverage profile not found under .build (expected default.profdata)."
            exit 1
          fi
          if [[ ! -x "$TEST_BIN" ]]; then
            echo "Test binary not found: $TEST_BIN"
            exit 1
          fi
          xcrun llvm-cov export \
            "$TEST_BIN" \
            -instr-profile "$PROFDATA" \
            -format lcov \
            -ignore-filename-regex '.build|Tests/' \
            > "$COVERAGE_FILE"
          if [[ ! -f "$COVERAGE_FILE" ]]; then
            echo "Coverage report not found: $COVERAGE_FILE"
            exit 1
          fi
          echo "COVERAGE_FILE=$COVERAGE_FILE" >> "$GITHUB_ENV"

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ env.COVERAGE_FILE }}
          fail_ci_if_error: false
